{% extends "base.html" %}
{% block title %}SYSTEM INTERFACE — Calendario{% endblock %}

{% block main_area %}
<div class="mod-wrap">
  {% include "modulos/_header.html" %}

  <div class="mod-toolbar">
    <span class="mod-toolbar__label">VISTA</span>
    <button type="button" class="mod-btn mod-btn--active" id="cal-view-month">MES</button>
    <span class="mod-toolbar__label" style="margin-left:1rem;">NAVEGACIÓN</span>
    <button type="button" class="mod-btn mod-btn--ghost" id="cal-prev">← ANTERIOR</button>
    <button type="button" class="mod-btn mod-btn--ghost" id="cal-today">HOY</button>
    <button type="button" class="mod-btn mod-btn--ghost" id="cal-next">SIGUIENTE →</button>
  </div>

  <div class="mod-cal">
    <div>
      <div style="display:flex;align-items:center;margin-bottom:0.65rem;gap:0.75rem;flex-wrap:wrap;">
        <span id="cal-month-label" class="mod-cal__month-label">—</span>
      </div>
      <div class="mod-cal__grid-wrap">
        <div class="mod-cal__weekdays" id="cal-weekdays">
          <span>LUN</span><span>MAR</span><span>MIÉ</span><span>JUE</span><span>VIE</span><span>SÁB</span><span>DOM</span>
        </div>
        <div class="mod-cal__cells" id="cal-cells"></div>
      </div>
    </div>

    <aside class="mod-cal__side">
      <h3>DÍA SELECCIONADO</h3>
      <ul class="mod-cal__event-list" id="cal-event-list"></ul>

      <h3 style="margin-top:1.25rem;">NUEVO EVENTO</h3>
      <form id="cal-event-form">
        <div class="mod-field">
          <label for="cal-title">Título</label>
          <input type="text" id="cal-title" name="title" required placeholder="Reunión, bloque de estudio…">
        </div>
        <div class="mod-field">
          <label for="cal-start">Inicio (local)</label>
          <input type="datetime-local" id="cal-start" name="start">
        </div>
        <div class="mod-field">
          <label for="cal-color">Color</label>
          <select id="cal-color" name="color">
            <option value="teal">Teal</option>
            <option value="yellow">Amarillo</option>
            <option value="purple">Púrpura</option>
            <option value="red">Rojo</option>
          </select>
        </div>
        <div class="mod-field">
          <label for="cal-notes">Notas</label>
          <textarea id="cal-notes" name="notes" placeholder="Opcional"></textarea>
        </div>
        <button type="submit" class="mod-btn" style="width:100%;">AÑADIR EVENTO</button>
      </form>
    </aside>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/calendar.js') }}?v=1"></script>
{% endblock %}
