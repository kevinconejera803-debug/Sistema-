{% extends "base.html" %}
{% block title %}SYSTEM INTERFACE — Calculadora{% endblock %}

{% block main_area %}
<div class="mod-wrap">
  {% include "modulos/_header.html" %}

  <div class="calc-shell">
    <div class="calc-display" id="calc-main">0</div>
    <div class="calc-sub" id="calc-sub"></div>
    <div class="calc-keys calc-keys--grid">
      <button type="button" data-key="C">C</button>
      <button type="button" data-key="÷">÷</button>
      <button type="button" data-key="×">×</button>
      <button type="button" data-key="−">−</button>
      <button type="button" data-key="7">7</button>
      <button type="button" data-key="8">8</button>
      <button type="button" data-key="9">9</button>
      <button type="button" data-key="+">+</button>
      <button type="button" data-key="4">4</button>
      <button type="button" data-key="5">5</button>
      <button type="button" data-key="6">6</button>
      <button type="button" data-key="×">×</button>
      <button type="button" data-key="1">1</button>
      <button type="button" data-key="2">2</button>
      <button type="button" data-key="3">3</button>
      <button type="button" data-key="−">−</button>
      <button type="button" data-key="0" class="calc-zero">0</button>
      <button type="button" data-key=".">.</button>
      <button type="button" data-key="=">=</button>
    </div>
    <div id="calc-hist" class="calc-hist"></div>
  </div>
  <p class="calc-hint">Operaciones encadenadas. <strong>C</strong> reinicia todo.</p>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/calculator.js') }}?v=2"></script>
{% endblock %}
