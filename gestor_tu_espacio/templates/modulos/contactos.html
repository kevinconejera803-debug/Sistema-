{% extends "base.html" %}
{% block title %}SYSTEM INTERFACE — Contactos{% endblock %}

{% block main_area %}
<div class="mod-wrap">
  {% include "modulos/_header.html" %}

  <div class="mod-toolbar">
    <span class="mod-toolbar__label">NUEVO CONTACTO</span>
  </div>

  <form id="contact-form" class="mod-cal__side" style="margin-bottom:1.5rem;">
    <input type="hidden" id="cf-id" value="">
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.75rem;">
      <div class="mod-field">
        <label for="cf-name">Nombre *</label>
        <input type="text" id="cf-name" required placeholder="Nombre completo" autocomplete="name">
      </div>
      <div class="mod-field">
        <label for="cf-email">Email</label>
        <input type="email" id="cf-email" placeholder="correo@ejemplo.com">
      </div>
      <div class="mod-field">
        <label for="cf-phone">Teléfono</label>
        <input type="text" id="cf-phone" placeholder="+34 …">
      </div>
      <div class="mod-field">
        <label for="cf-company">Empresa / rol</label>
        <input type="text" id="cf-company" placeholder="Opcional">
      </div>
      <div class="mod-field" style="grid-column:1/-1;">
        <label for="cf-notes">Notas</label>
        <textarea id="cf-notes" placeholder="Contexto, próximo seguimiento…"></textarea>
      </div>
    </div>
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.75rem;">
      <button type="submit" class="mod-btn" id="cf-submit">GUARDAR CONTACTO</button>
      <button type="button" class="mod-btn mod-btn--ghost" id="cf-cancel" hidden>CANCELAR EDICIÓN</button>
    </div>
  </form>

  <div class="contact-grid" id="contact-grid"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/contacts.js') }}?v=2"></script>
{% endblock %}
