<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tu Espacio — Santuario Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./index.css">
  <style>
    :root {
      --bg: #0b1326;
      --bg-alt: #0f172a;
      --surface: rgba(30, 41, 59, 0.8);
      --surface-hover: #334155;
      --surface-glass: rgba(11, 19, 38, 0.85);
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --stroke: rgba(51, 65, 85, 0.5);
      --stroke-bright: #475569;
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.4);
      --accent-dark: #0ea5e9;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --glass: blur(12px);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; overflow-x: hidden; }
    
    /* ===== APP LAYOUT ===== */
    .app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    
    /* ===== SIDE NAV ===== */
    .sidenav { background: var(--bg); border-right: 1px solid var(--stroke); padding: 1.5rem 0; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
    .sidenav__brand { display: flex; align-items: center; gap: 0.75rem; padding: 0 1.5rem; margin-bottom: 2rem; }
    .sidenav__logo { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 700; font-size: 1.25rem; color: var(--bg); }
    .sidenav__title { font-family: 'Instrument Serif', serif; font-size: 1.25rem; font-style: italic; background: linear-gradient(135deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sidenav__divider { height: 1px; background: var(--stroke); margin: 0 1.5rem 1.5rem; }
    .sidenav__section { padding: 0 0.75rem; margin-bottom: 1.5rem; }
    .sidenav__section-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); padding: 0 0.75rem; margin-bottom: 0.5rem; }
    .sidenav__item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 10px; color: var(--text-muted); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; cursor: pointer; }
    .sidenav__item:hover { background: var(--surface); color: var(--text); }
    .sidenav__item.active { background: linear-gradient(135deg, rgba(56, 189, 248, 0.15), rgba(56, 189, 248, 0.05)); color: var(--accent); border: 1px solid rgba(56, 189, 248, 0.3); }
    .sidenav__item-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
    .sidenav__footer { margin-top: auto; padding: 0 0.75rem; border-top: 1px solid var(--stroke); padding-top: 1rem; }
    
    /* ===== MAIN CONTENT ===== */
    .main { background: var(--bg-alt); min-height: 100vh; }
    
    /* ===== TOP BAR ===== */
    .topbar { position: sticky; top: 0; z-index: 50; background: var(--surface-glass); backdrop-filter: var(--glass); border-bottom: 1px solid var(--stroke); padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
    .topbar__search { flex: 1; max-width: 400px; position: relative; }
    .topbar__search input { width: 100%; padding: 0.625rem 1rem 0.625rem 2.5rem; background: var(--surface); border: 1px solid var(--stroke); border-radius: 10px; color: var(--text); font-size: 0.875rem; outline: none; transition: all 0.2s; }
    .topbar__search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .topbar__search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
    .topbar__actions { display: flex; gap: 0.5rem; margin-left: auto; }
    .topbar__btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--surface); border: 1px solid var(--stroke); border-radius: 10px; color: var(--text-muted); font-size: 1.125rem; cursor: pointer; transition: all 0.2s; }
    .topbar__btn:hover { background: var(--surface-hover); color: var(--accent); }
    .topbar__avatar { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--success)); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.875rem; }
    
    /* ===== PAGE CONTENT ===== */
    .page { padding: 2rem; }
    .page__header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .page__title { font-family: 'Instrument Serif', serif; font-size: 2rem; font-style: italic; }
    .page__subtitle { color: var(--text-muted); font-size: 0.875rem; margin-top: 0.25rem; }
    
    /* ===== LOADING ===== */
    .loading { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; }
    .loading__logo { width: 60px; height: 60px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 700; font-size: 2rem; color: var(--bg); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    .loading__text { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.5rem; color: var(--text-muted); }
    .loading__bar { width: 200px; height: 4px; background: var(--stroke); border-radius: 2px; overflow: hidden; }
    .loading__bar-fill { height: 100%; background: var(--accent); width: 0%; animation: load 1.5s ease-out forwards; }
    @keyframes load { to { width: 100%; } }
    
    /* ===== HERO (HOME) ===== */
    .hero { min-height: calc(100vh - 80px); display: flex; align-items: center; justify-content: center; position: relative; background: radial-gradient(ellipse at 30% 0%, rgba(56, 189, 248, 0.1) 0%, transparent 50%), radial-gradient(ellipse at 70% 100%, rgba(34, 197, 94, 0.05) 0%, transparent 50%); }
    .hero__video { position: absolute; inset: 0; overflow: hidden; opacity: 0.15; }
    .hero__video video { width: 100%; height: 100%; object-fit: cover; }
    .hero__content { text-align: center; max-width: 600px; padding: 2rem; z-index: 10; }
    .hero__eyebrow { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.25em; color: var(--accent); margin-bottom: 1.5rem; }
    .hero__title { font-family: 'Instrument Serif', serif; font-size: clamp(2.5rem, 8vw, 5rem); font-style: italic; line-height: 1.1; margin-bottom: 1rem; background: linear-gradient(135deg, var(--text) 30%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero__subtitle { font-size: 1.125rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .hero__desc { font-size: 0.875rem; color: var(--text-dim); }
    
    /* ===== CARDS GRID ===== */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; }
    .card { background: var(--surface); border: 1px solid var(--stroke); border-radius: 12px; padding: 1.5rem; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; }
    .card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent, rgba(56, 189, 248, 0.05)); opacity: 0; transition: opacity 0.3s; }
    .card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 0 1px var(--accent-glow); }
    .card:hover::before { opacity: 1; }
    .card__icon { font-size: 2rem; margin-bottom: 0.75rem; }
    .card__title { font-family: 'Instrument Serif', serif; font-size: 1.125rem; font-style: italic; margin-bottom: 0.25rem; }
    .card__desc { font-size: 0.8rem; color: var(--text-dim); }
    
    /* ===== MODULE SPECIFIC ===== */
    .module { padding: 0; }
    .module__header { margin-bottom: 1.5rem; }
    .module__title { font-family: 'Instrument Serif', serif; font-size: 1.75rem; font-style: italic; }
    .module__kicker { color: var(--text-muted); font-size: 0.875rem; }
    
    /* ===== TOOLBAR ===== */
    .toolbar { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .btn { padding: 0.5rem 1rem; background: var(--surface); border: 1px solid var(--stroke); border-radius: 8px; color: var(--text); font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn--primary { background: var(--accent); border-color: var(--accent); color: var(--bg); }
    .btn--primary:hover { background: var(--accent-dark); }
    .btn--ghost { background: transparent; border-color: transparent; }
    .btn--ghost:hover { background: var(--surface); }
    
    /* ===== FORM ===== */
    .form { background: var(--surface); border: 1px solid var(--stroke); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .form__head { margin-bottom: 1rem; font-family: 'Instrument Serif', serif; font-style: italic; }
    .form__row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .input { flex: 1; min-width: 150px; padding: 0.625rem 0.875rem; background: var(--bg); border: 1px solid var(--stroke); border-radius: 8px; color: var(--text); font-size: 0.875rem; outline: none; transition: all 0.2s; }
    .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .input::placeholder { color: var(--text-dim); }
    
    /* ===== KANBAN ===== */
    .kanban { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .kanban__col { background: var(--surface); border: 1px solid var(--stroke); border-radius: 12px; padding: 1rem; }
    .kanban__header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 1rem; border-bottom: 1px solid var(--stroke); margin-bottom: 1rem; }
    .kanban__title { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1rem; }
    .kanban__count { background: var(--bg); padding: 0.25rem 0.5rem; border-radius: 6px; font-size: 0.75rem; }
    .kanban__card { background: var(--bg); border: 1px solid var(--stroke); border-radius: 10px; padding: 0.875rem; margin-bottom: 0.75rem; transition: all 0.2s; }
    .kanban__card:hover { border-color: var(--accent-glow); }
    .kanban__card-title { font-weight: 500; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .kanban__card-meta { display: flex; gap: 0.5rem; font-size: 0.75rem; color: var(--text-dim); }
    .kanban__card-priority { padding: 0.125rem 0.375rem; border-radius: 4px; font-size: 0.65rem; text-transform: uppercase; font-weight: 600; }
    .kanban__card-priority.high { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .kanban__card-priority.medium { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
    .kanban__card-priority.low { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    
    /* ===== TIMELINE CALENDAR ===== */
    .timeline { overflow-x: auto; }
    .timeline__header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.5rem; margin-bottom: 0.5rem; }
    .timeline__day { text-align: center; padding: 0.75rem; }
    .timeline__day-name { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }
    .timeline__day-num { font-size: 1.5rem; font-weight: 600; }
    .timeline__day.today .timeline__day-num { color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }
    .timeline__grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.5rem; }
    .timeline__col { background: var(--surface); border: 1px solid var(--stroke); border-radius: 10px; min-height: 300px; padding: 0.5rem; }
    .timeline__col.today { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
    .timeline__event { background: var(--bg); border-left: 3px solid var(--accent); border-radius: 6px; padding: 0.5rem; margin-bottom: 0.5rem; font-size: 0.8rem; }
    .timeline__empty { text-align: center; color: var(--text-dim); font-size: 0.75rem; padding: 2rem 0; }
    
    /* ===== CONTACTS GRID ===== */
    .contacts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .contact-card { display: flex; align-items: center; gap: 1rem; background: var(--surface); border: 1px solid var(--stroke); border-radius: 12px; padding: 1rem; transition: all 0.2s; }
    .contact-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .contact-card__avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 1.25rem; color: white; flex-shrink: 0; }
    .contact-card__info { flex: 1; min-width: 0; }
    .contact-card__name { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 500; }
    .contact-card__role { font-size: 0.8rem; color: var(--accent); }
    .contact-card__actions { display: flex; gap: 0.5rem; }
    .contact-card__btn { background: none; border: none; font-size: 1rem; cursor: pointer; opacity: 0.5; transition: opacity 0.2s; }
    .contact-card__btn:hover { opacity: 1; }
    
    /* ===== MARKETS ===== */
    .markets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
    .market-card { background: var(--surface); border: 1px solid var(--stroke); border-radius: 12px; padding: 1.25rem; text-align: center; transition: all 0.2s; }
    .market-card:hover { transform: translateY(-3px); }
    .market-card.up { border-top: 3px solid var(--success); }
    .market-card.down { border-top: 3px solid var(--error); }
    .market-card__icon { font-size: 1.75rem; margin-bottom: 0.5rem; }
    .market-card__symbol { font-size: 0.75rem; color: var(--text-dim); font-weight: 600; }
    .market-card__name { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 0.5rem; }
    .market-card__price { font-size: 1.25rem; font-weight: 700; }
    .market-card__change { font-size: 0.85rem; font-weight: 600; }
    .market-card__change.up { color: var(--success); }
    .market-card__change.down { color: var(--error); }
    
    /* ===== NEWS ===== */
    .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
    .news-card { background: var(--surface); border: 1px solid var(--stroke); border-radius: 12px; overflow: hidden; transition: all 0.2s; cursor: pointer; }
    .news-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .news-card__image { height: 120px; background: linear-gradient(135deg, var(--surface-hover), var(--bg)); display: flex; align-items: center; justify-content: center; font-size: 3rem; }
    .news-card__content { padding: 1rem; }
    .news-card__category { font-size: 0.65rem; color: var(--accent); text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em; }
    .news-card__title { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1rem; margin: 0.5rem 0; line-height: 1.3; }
    .news-card__meta { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text-dim); }
    
    /* ===== CHAT ===== */
    .chat { display: flex; flex-direction: column; height: calc(100vh - 200px); }
    .chat__messages { flex: 1; overflow-y: auto; padding: 1rem; }
    .chat__msg { display: flex; gap: 0.75rem; margin-bottom: 1rem; }
    .chat__msg.bot { align-items: flex-start; }
    .chat__msg.user { flex-direction: row-reverse; }
    .chat__avatar { width: 32px; height: 32px; border-radius: 8px; background: var(--surface-hover); display: flex; align-items: center; justify-content: center; font-size: 0.875rem; }
    .chat__bubble { max-width: 70%; padding: 0.75rem 1rem; border-radius: 12px; font-size: 0.9rem; }
    .chat__msg.bot .chat__bubble { background: var(--surface); border-bottom-left-radius: 4px; }
    .chat__msg.user .chat__bubble { background: var(--accent); color: var(--bg); border-bottom-right-radius: 4px; }
    .chat__input-wrap { display: flex; gap: 0.5rem; padding: 1rem; border-top: 1px solid var(--stroke); }
    .chat__input { flex: 1; padding: 0.75rem 1rem; background: var(--surface); border: 1px solid var(--stroke); border-radius: 24px; color: var(--text); font-size: 0.875rem; outline: none; }
    .chat__input:focus { border-color: var(--accent); }
    .chat__send { padding: 0.75rem 1.5rem; background: var(--accent); border: none; border-radius: 24px; color: var(--bg); font-weight: 600; cursor: pointer; }
    
    /* ===== ORACIONES ===== */
    .prayers-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .prayer-card { display: flex; align-items: center; gap: 1rem; background: var(--surface); border: 1px solid var(--stroke); border-radius: 12px; padding: 1rem; transition: all 0.2s; }
    .prayer-card:hover { border-color: var(--stroke-bright); }
    .prayer-card__status { width: 8px; height: 40px; border-radius: 4px; }
    .prayer-card__status.pending { background: var(--text-dim); }
    .prayer-card__status.in_progress { background: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }
    .prayer-card__status.answered { background: var(--success); }
    .prayer-card__info { flex: 1; }
    .prayer-card__title { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 500; }
    .prayer-card__desc { font-size: 0.8rem; color: var(--text-dim); }
    .prayer-card__status-text { font-size: 0.7rem; color: var(--text-dim); }
    
    /* ===== EMPTY STATE ===== */
    .empty { text-align: center; padding: 3rem; color: var(--text-dim); }
    .empty__icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
    
    /* ===== FOOTER ===== */
    .footer { padding: 1.5rem 2rem; text-align: center; border-top: 1px solid var(--stroke); color: var(--text-dim); font-size: 0.8rem; }
    .footer a { color: var(--accent); text-decoration: none; }
    
    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .app { grid-template-columns: 1fr; }
      .sidenav { display: none; }
      .kanban { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
