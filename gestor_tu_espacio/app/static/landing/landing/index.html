<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tu Espacio — Santuario Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <!-- Remove external CSS reference - all styles are inline -->
  <style>
    :root {
      --bg: #0b1326;
      --bg-alt: #0f172a;
      --surface: rgba(30, 41, 59, 0.8);
      --surface-hover: #334155;
      --surface-glass: rgba(11, 19, 38, 0.85);
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --stroke: rgba(51, 65, 85, 0.5);
      --stroke-bright: #475569;
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.4);
      --accent-dark: #0ea5e9;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --glass: blur(12px);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; overflow-x: hidden; }
    
    /* ===== APP LAYOUT ===== */
    .app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    .landing { min-height: 100vh; display: flex; flex-direction: column; }
    
    /* ===== SIDE NAV ===== */
    .sidenav { background: var(--bg); border-right: 1px solid var(--stroke); padding: 1.5rem 0; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
    .sidenav__brand { display: flex; align-items: center; gap: 0.75rem; padding: 0 1.5rem; margin-bottom: 2rem; }
    .sidenav__logo { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 700; font-size: 1.25rem; color: var(--bg); }
    .sidenav__title { font-family: 'Instrument Serif', serif; font-size: 1.25rem; font-style: italic; background: linear-gradient(135deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sidenav__divider { height: 1px; background: var(--stroke); margin: 0 1.5rem 1.5rem; }
    .sidenav__section { padding: 0 0.75rem; margin-bottom: 1.5rem; }
    .sidenav__section-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); padding: 0 0.75rem; margin-bottom: 0.5rem; }
    .sidenav__item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 10px; color: var(--text-muted); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; cursor: pointer; }
    .sidenav__item:hover { background: var(--surface); color: var(--text); }
    .sidenav__item.active { background: linear-gradient(135deg, rgba(56, 189, 248, 0.15), rgba(56, 189, 248, 0.05)); color: var(--accent); border: 1px solid rgba(56, 189, 248, 0.3); }
    .sidenav__item-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
    .sidenav__footer { margin-top: auto; padding: 0 0.75rem; border-top: 1px solid var(--stroke); padding-top: 1rem; }
    
    /* ===== MAIN CONTENT ===== */
    .main { background: var(--bg-alt); min-height: 100vh; display: flex; flex-direction: column; }
    
    /* ===== TOP BAR ===== */
    .topbar { position: sticky; top: 0; z-index: 50; background: var(--surface-glass); backdrop-filter: var(--glass); border-bottom: 1px solid var(--stroke); padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
    .topbar__search { flex: 1; max-width: 400px; position: relative; }
    .topbar__search input { width: 100%; padding: 0.625rem 1rem 0.625rem 2.5rem; background: var(--surface); border: 1px solid var(--stroke); border-radius: 10px; color: var(--text); font-size: 0.875rem; outline: none; transition: all 0.2s; }
    .topbar__search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .topbar__search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
    .topbar__actions { display: flex; gap: 0.5rem; margin-left: auto; }
    .topbar__btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--surface); border: 1px solid var(--stroke); border-radius: 10px; color: var(--text-muted); font-size: 1.125rem; cursor: pointer; transition: all 0.2s; }
    .topbar__btn:hover { background: var(--surface-hover); color: var(--accent); }
    .topbar__avatar { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--success)); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.875rem; }
    
    /* ===== PAGE CONTENT ===== */
    .page { padding: 0; flex: 1; display: flex; flex-direction: column; }
    .sys-view { flex: 1; display: flex; flex-direction: column; }
    
    /* ===== LOADING SCREEN ===== */
    .sys-loading { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; }
    .sys-loading__counter { font-family: 'Instrument Serif', serif; font-size: 3rem; font-style: italic; color: var(--accent); }
    .sys-loading__bar { width: 200px; height: 3px; background: var(--stroke); border-radius: 2px; overflow: hidden; }
    .sys-loading__bar-fill { height: 100%; background: var(--accent); width: 0%; }
    
    /* ===== HERO (HOME) ===== */
    .sys-hero { min-height: calc(100vh - 64px); display: flex; align-items: center; justify-content: center; position: relative; background: radial-gradient(ellipse at 30% 0%, rgba(56, 189, 248, 0.12) 0%, transparent 50%), radial-gradient(ellipse at 70% 100%, rgba(34, 197, 94, 0.08) 0%, transparent 50%), var(--bg-alt); overflow: hidden; }
    .sys-hero__video { position: absolute; inset: 0; overflow: hidden; }
    .sys-hero__video video { width: 100%; height: 100%; object-fit: cover; opacity: 0.08; }
    .sys-hero__overlay { position: absolute; inset: 0; background: linear-gradient(180deg, var(--bg-alt) 0%, var(--bg) 100%); }
    .sys-hero__content { text-align: center; max-width: 700px; padding: 2rem; z-index: 10; position: relative; }
    .sys-hero__eyebrow { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.3em; color: var(--accent); margin-bottom: 1.5rem; font-weight: 600; }
    .sys-hero__title { font-family: 'Instrument Serif', serif; font-size: clamp(3rem, 10vw, 6rem); font-style: italic; line-height: 1.05; margin-bottom: 1rem; background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sys-hero__subtitle { font-size: 1.25rem; color: var(--text-muted); margin-bottom: 0.5rem; font-weight: 500; }
    .sys-hero__desc { font-size: 0.9rem; color: var(--text-dim); max-width: 400px; margin: 0 auto; }
    
    /* ===== MODULES SECTION ===== */
    .sys-section { padding: 3rem 2rem; background: var(--bg); }
    .sys-section__header { text-align: center; margin-bottom: 3rem; }
    .sys-section__title { font-family: 'Instrument Serif', serif; font-size: 1.5rem; font-style: italic; color: var(--text-muted); letter-spacing: 0.1em; margin-bottom: 0.5rem; }
    .sys-section__subtitle { color: var(--text-dim); font-size: 0.9rem; }
    
    /* ===== MODULE CARDS GRID ===== */
    .sys-grid { 
      display: grid; 
      grid-template-columns: repeat(4, 1fr); 
      gap: 1.25rem; 
      max-width: 1100px; 
      margin: 0 auto; 
      padding: 0 1rem;
    }
    @media (max-width: 900px) {
      .sys-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 700px) {
      .sys-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .sys-card { background: var(--surface); border: 1px solid var(--stroke); border-radius: 16px; padding: 1.5rem; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 140px; }
    .sys-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent 0%, var(--card-accent, var(--accent)) 200%); opacity: 0; transition: opacity 0.3s; }
    .sys-card:hover { transform: translateY(-6px); border-color: var(--card-accent, var(--accent)); box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--card-accent, var(--accent)); }
    .sys-card:hover::before { opacity: 0.08; }
    .sys-card__icon { font-size: 2rem; margin-bottom: 0.75rem; position: relative; }
    .sys-card__title { font-family: 'Instrument Serif', serif; font-size: 1.1rem; font-style: italic; margin-bottom: 0.25rem; color: var(--text); position: relative; }
    .sys-card__desc { font-size: 0.75rem; color: var(--text-dim); position: relative; }
    
    /* ===== STATS ===== */
    .sys-stats { display: flex; justify-content: center; gap: 3rem; padding: 2rem; background: var(--bg); flex-wrap: wrap; }
    .sys-stat { text-align: center; }
    .sys-stat__value { font-family: 'Instrument Serif', serif; font-size: 2.5rem; font-style: italic; color: var(--accent); }
    .sys-stat__label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-dim); margin-top: 0.25rem; }
    
    /* ===== FOOTER ===== */
    .sys-footer { padding: 2rem; text-align: center; background: var(--bg); border-top: 1px solid var(--stroke); }
    .sys-footer p { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 1rem; }
    .sys-footer__links { display: flex; justify-content: center; gap: 1rem; font-size: 0.8rem; }
    .sys-footer a { color: var(--accent); text-decoration: none; transition: opacity 0.2s; }
    .sys-footer a:hover { opacity: 0.7; }
    .sys-footer span { color: var(--text-dim); }
    
    /* ===== MODULE PAGES ===== */
    .sys-module { padding: 2rem; max-width: 1400px; margin: 0 auto; width: 100%; }
    .sys-module__header { margin-bottom: 2rem; }
    .sys-module__title { font-family: 'Instrument Serif', serif; font-size: 2rem; font-style: italic; margin-bottom: 0.25rem; }
    .sys-module__kicker { color: var(--text-muted); font-size: 0.9rem; }
    
    /* ===== BUTTONS ===== */
    .sys-btn { padding: 0.625rem 1.25rem; border-radius: 10px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
    .sys-btn--primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .sys-btn--primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
    .sys-btn--ghost { background: transparent; border-color: var(--stroke); color: var(--text-muted); }
    .sys-btn--ghost:hover { border-color: var(--accent); color: var(--accent); }
    
    /* ===== FORM ===== */
    .sys-form { background: var(--surface); border: 1px solid var(--stroke); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .sys-form__head { margin-bottom: 1rem; }
    .sys-form__badge { display: inline-block; padding: 0.25rem 0.75rem; background: var(--accent); color: var(--bg); border-radius: 20px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .sys-form__row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .sys-input { flex: 1; min-width: 150px; padding: 0.75rem 1rem; background: var(--bg); border: 1px solid var(--stroke); border-radius: 10px; color: var(--text); font-size: 0.875rem; outline: none; transition: all 0.2s; }
    .sys-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .sys-input::placeholder { color: var(--text-dim); }
    
    /* ===== CALENDAR ===== */
    .sys-cal-nav { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 1.5rem; }
    .sys-cal-nav-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: var(--surface); border: 1px solid var(--stroke); border-radius: 10px; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
    .sys-cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
    .sys-cal-current { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.1rem; min-width: 200px; text-align: center; }
    .sys-cal-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .sys-cal-tab { display: flex; align-items: center; gap: 0.5rem; padding: 0.625rem 1rem; background: var(--surface); border: 1px solid var(--stroke); border-radius: 10px; color: var(--text-muted); font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .sys-cal-tab:hover { border-color: var(--accent); color: var(--text); }
    .sys-cal-tab.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }
    .sys-cal-tab-icon { font-size: 1rem; }
    .sys-cal-add { margin-left: auto; }
    
    .sys-cal-timeline { overflow-x: auto; }
    .sys-cal-week { display: grid; grid-template-columns: repeat(7, minmax(100px, 1fr)); gap: 0.5rem; }
    .sys-cal-day { background: var(--surface); border: 1px solid var(--stroke); border-radius: 12px; min-height: 400px; overflow: hidden; }
    .sys-cal-day.today { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
    .sys-cal-day-header { padding: 0.75rem; text-align: center; border-bottom: 1px solid var(--stroke); background: var(--bg); }
    .sys-cal-day-name { display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); }
    .sys-cal-day-num { display: block; font-size: 1.25rem; font-weight: 600; margin-top: 0.25rem; }
    .sys-cal-day.today .sys-cal-day-num { color: var(--accent); }
    .sys-cal-hours { padding: 0.5rem; }
    .sys-cal-hour { height: 36px; border-bottom: 1px solid var(--stroke); display: flex; align-items: flex-start; }
    .sys-cal-hour-empty { width: 100%; }
    .sys-cal-event { background: var(--bg); border-left: 3px solid var(--accent); border-radius: 6px; padding: 0.375rem 0.5rem; margin-bottom: 0.25rem; font-size: 0.75rem; }
    .sys-cal-event-time { color: var(--text-dim); margin-right: 0.5rem; }
    
    .sys-cal-list { display: grid; gap: 1.5rem; }
    .sys-cal-section-title { display: flex; align-items: center; gap: 0.5rem; font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1.1rem; margin-bottom: 1rem; }
    .sys-cal-section-icon { font-size: 1.25rem; }
    .sys-cal-section-count { margin-left: auto; background: var(--surface); padding: 0.25rem 0.625rem; border-radius: 20px; font-size: 0.75rem; color: var(--text-dim); font-family: 'Inter', sans-serif; font-style: normal; }
    .sys-cal-empty { color: var(--text-dim); font-size: 0.875rem; padding: 1rem 0; }
    .sys-cal-list-item { display: flex; gap: 1rem; padding: 0.875rem; background: var(--surface); border: 1px solid var(--stroke); border-left: 3px solid var(--accent); border-radius: 10px; margin-bottom: 0.5rem; }
    .sys-cal-list-item-time, .sys-cal-list-item-date { color: var(--text-dim); font-size: 0.8rem; min-width: 60px; }
    .sys-cal-list-item-title { font-weight: 500; }
    
    /* ===== KANBAN ===== */
    .sys-kanban { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
    @media (max-width: 768px) { .sys-kanban { grid-template-columns: 1fr; } }
    .sys-kanban-column { background: var(--surface); border: 1px solid var(--stroke); border-radius: 16px; padding: 1rem; }
    .sys-kanban-column.done { opacity: 0.7; }
    .sys-kanban-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 1rem; border-bottom: 1px solid var(--stroke); margin-bottom: 1rem; font-weight: 600; font-size: 0.85rem; letter-spacing: 0.05em; }
    .sys-kanban-count { background: var(--bg); padding: 0.25rem 0.5rem; border-radius: 6px; font-size: 0.75rem; }
    .sys-kanban-tasks { min-height: 200px; }
    .sys-kanban-empty { text-align: center; color: var(--text-dim); font-size: 0.85rem; padding: 2rem 0; }
    .sys-kanban-card { background: var(--bg); border: 1px solid var(--stroke); border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; transition: all 0.2s; }
    .sys-kanban-card:hover { border-color: var(--accent-glow); }
    .sys-kanban-card.overdue { border-left: 3px solid var(--error); }
    .sys-kanban-card.completed { opacity: 0.6; }
    .sys-kanban-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .sys-kanban-course { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); }
    .sys-kanban-priority { padding: 0.125rem 0.375rem; border-radius: 4px; font-size: 0.6rem; text-transform: uppercase; font-weight: 600; }
    .sys-kanban-priority.high { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .sys-kanban-priority.medium { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
    .sys-kanban-priority.low { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .sys-kanban-title { font-weight: 500; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .sys-kanban-meta { font-size: 0.75rem; color: var(--text-dim); }
    .sys-kanban-due.overdue { color: var(--error); }
    .sys-kanban-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
    .sys-kanban-actions button { padding: 0.375rem 0.625rem; background: var(--surface); border: 1px solid var(--stroke); border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
    .sys-kanban-actions button:hover { border-color: var(--accent); }
    
    .sys-progress-bar { height: 6px; background: var(--surface); border-radius: 3px; overflow: hidden; margin-bottom: 1.5rem; position: relative; }
    .sys-progress-bar__fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--success)); border-radius: 3px; transition: width 0.5s ease; }
    .sys-progress-bar__label { position: absolute; right: 0; top: 10px; font-size: 0.7rem; color: var(--text-dim); }
    .sys-stats-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .sys-stat-badge { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: var(--surface); border: 1px solid var(--stroke); border-radius: 10px; }
    .sys-stat-badge__value { font-weight: 600; color: var(--accent); }
    .sys-stat-badge__label { font-size: 0.75rem; color: var(--text-dim); }
    .sys-stat-badge.done .sys-stat-badge__value { color: var(--success); }
    .sys-stat-badge.pending .sys-stat-badge__value { color: var(--warning); }
    .sys-toolbar { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
    .sys-toolbar__spacer { flex: 1; }
    .sys-urls { margin-top: 1.5rem; }
    .sys-url-card { background: var(--surface); border: 1px solid var(--stroke); border-radius: 16px; padding: 1.5rem; }
    .sys-url-card h3 { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 1rem; margin-bottom: 1rem; }
    .sys-url-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
    .sys-url-row .sys-input { flex: 1; }
    
    .sys-loading-inline { display: flex; align-items: center; gap: 0.75rem; color: var(--text-dim); font-size: 0.875rem; padding: 2rem 0; }
    .sys-spinner { width: 20px; height: 20px; border: 2px solid var(--stroke); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sys-empty { text-align: center; padding: 3rem; color: var(--text-dim); }
    .sys-empty__icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
    .sys-tasks { display: flex; flex-direction: column; gap: 0.5rem; }
    .sys-task { display: flex; align-items: center; justify-content: space-between; padding: 0.875rem 1rem; background: var(--surface); border: 1px solid var(--stroke); border-radius: 10px; transition: all 0.2s; }
    .sys-task:hover { border-color: var(--accent-glow); }
    .sys-task.completed { opacity: 0.6; }
    .sys-task.overdue { border-left: 3px solid var(--error); }
    .sys-task__check { display: flex; align-items: center; gap: 0.75rem; flex: 1; }
    .sys-task__check input { width: 18px; height: 18px; accent-color: var(--accent); }
    .sys-task__title { font-size: 0.9rem; }
    .sys-task.completed .sys-task__title { text-decoration: line-through; }
    .sys-task__meta { display: flex; align-items: center; gap: 1rem; font-size: 0.8rem; color: var(--text-dim); }
    .sys-task__due.overdue { color: var(--error); }
    .sys-task__priority { padding: 0.125rem 0.375rem; border-radius: 4px; font-size: 0.6rem; text-transform: uppercase; font-weight: 600; }
    .sys-task__priority.priority-high { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .sys-task__priority.priority-medium { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
    .sys-task__priority.priority-low { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .sys-btn-icon { background: none; border: none; cursor: pointer; font-size: 1rem; opacity: 0.5; transition: opacity 0.2s; }
    .sys-btn-icon:hover { opacity: 1; }
    
    /* ===== CONTACTS ===== */
    .sys-con-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .sys-con-tab { display: flex; align-items: center; gap: 0.5rem; padding: 0.625rem 1rem; background: var(--surface); border: 1px solid var(--stroke); border-radius: 10px; color: var(--text-muted); font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
