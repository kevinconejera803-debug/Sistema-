{% extends "base.html" %}
{% block title %}Tu Espacio — Investigación{% endblock %}

{% block main_area %}
<div class="mod-wrap mod-research">
  {% include "modulos/_header.html" %}

  <div class="research-clean">
    <div class="hero-clean">
      <h1 class="title-clean">📚 Centro de Investigación</h1>
      <p class="subtitle-clean">Pregunta sobre el mundo actual, historia, ciencia, tecnología y más</p>
    </div>

    <div class="search-clean-wrapper">
      <div class="search-clean-box">
        <input 
          type="text" 
          id="smart-search" 
          class="search-clean-input"
          placeholder="Escribe tu pregunta... Ej: ¿Qué está pasando en el mundo?"
          autocomplete="off"
          autofocus
        />
        <button id="smart-search-btn" class="search-clean-btn">
          <span class="btn-icon">🔍</span>
          <span class="btn-text">Investigar</span>
        </button>
      </div>
      
      <div class="quick-tags">
        <button class="quick-tag" data-q="¿Qué está pasando en Chile?">Chile</button>
        <button class="quick-tag" data-q="¿Qué es inteligencia artificial?">Tecnología</button>
        <button class="quick-tag" data-q="¿Qué pasó en la guerra de Ukraine?">Ucranía</button>
        <button class="quick-tag" data-q="¿Cómo está la economía mundial?">Economía</button>
        <button class="quick-tag" data-q="¿Qué dicen los expertos sobre el cambio climático?">Medio Ambiente</button>
      </div>
    </div>

    <div id="smart-results" class="results-clean" style="display:none;">
      <div class="results-header-clean">
        <span id="results-icon">📖</span>
        <span id="results-title">Resultados de Investigación</span>
        <button id="close-smart-results" class="close-clean">✕</button>
      </div>
      <div id="smart-results-content" class="results-content-clean"></div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/research_smart.js') }}?v=20"></script>
{% endblock %}
