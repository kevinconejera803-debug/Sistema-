{% extends "base.html" %}
{% block title %}{{ mod.title }} — Tu Espacio{% endblock %}

{% block main_area %}
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-hover: #1a1a1a;
    --text: #f2f2f2;
    --text-muted: #888;
    --stroke: #222;
    --accent: #89AACC;
    --accent-dark: #4E85BF;
  }
  html, body { 
    background: var(--bg) !important; 
    color: var(--text) !important;
  }
  .mod-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 1rem; display: flex; justify-content: center;
  }
  .mod-nav-inner {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.5rem 1rem;
    background: rgba(20,20,20,0.9);
    backdrop-filter: blur(10px);
    border: 1px solid var(--stroke);
    border-radius: 9999px;
  }
  .mod-nav-link {
    padding: 0.5rem 1rem;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.8rem;
    border-radius: 9999px;
    transition: all 0.2s;
  }
  .mod-nav-link:hover { color: var(--text); background: var(--surface); }
  .mod-hero {
    min-height: 40vh;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    padding: 6rem 2rem 2rem;
    text-align: center;
    background: radial-gradient(ellipse at 50% 0%, #1a1a2e 0%, var(--bg) 70%);
  }
  .mod-hero-icon { font-size: 4rem; margin-bottom: 1rem; }
  .mod-hero-title {
    font-size: clamp(2rem, 6vw, 4rem);
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    margin-bottom: 0.5rem;
  }
  .mod-hero-desc { color: var(--text-muted); max-width: 500px; }
  .mod-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem;
  }
  .mod-back {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 1.5rem;
    margin-bottom: 1rem;
    background: var(--surface);
    border: 1px solid var(--stroke);
    border-radius: 9999px;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .mod-back:hover { color: var(--text); border-color: var(--accent); }
  @media (max-width: 640px) {
    .mod-nav-inner { gap: 0.25rem; }
    .mod-nav-link { padding: 0.5rem 0.75rem; font-size: 0.7rem; }
  }
</style>

<nav class="mod-nav">
  <div class="mod-nav-inner">
    <a href="/" class="mod-nav-link">Home</a>
    <a href="/calendario" class="mod-nav-link">Calendario</a>
    <a href="/universidad" class="mod-nav-link">Universidad</a>
    <a href="/contactos" class="mod-nav-link">Contactos</a>
    <a href="/asistente" class="mod-nav-link">IA</a>
  </div>
</nav>

<section class="mod-hero">
  <div class="mod-hero-icon">{{ mod.icon }}</div>
  <h1 class="mod-hero-title">{{ mod.title }}</h1>
  <p class="mod-hero-desc">{{ mod.lead }}</p>
</section>

<div class="mod-content">
  <a href="/" class="mod-back">← Volver al Home</a>
  
  {% block modulo_contenido %}
  <div style="background: var(--surface); border: 1px solid var(--stroke); border-radius: 1rem; padding: 2rem;">
    <p style="color: var(--text-muted); text-align: center;">Cargando módulo...</p>
  </div>
  {% endblock %}
</div>
{% endblock %}
